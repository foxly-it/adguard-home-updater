name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:

    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------------
      # Checkout repository
      # ---------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------
      # Inject version into script
      # ---------------------------------------------------------

      - name: Inject version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/VERSION=\"dev\"/VERSION=\"$VERSION\"/" adguard-update

      # ---------------------------------------------------------
      # Generate checksums
      # ---------------------------------------------------------

      - name: Generate checksums
        run: |
          sha256sum adguard-update install.sh > checksums.txt

      # ---------------------------------------------------------
      # Generate structured release notes
      # ---------------------------------------------------------

      - name: Generate Release Notes
        run: |

          VERSION=${GITHUB_REF_NAME}

          echo "# AdGuard Home Updater $VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          echo "Automated release generated by GitHub Actions." >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          echo "## Features" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD \
          --pretty=format:"%s" | grep "^feat:" | sed 's/^feat:/-/' >> RELEASE_NOTES.md || true
          echo "" >> RELEASE_NOTES.md

          echo "## Fixes" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD \
          --pretty=format:"%s" | grep "^fix:" | sed 's/^fix:/-/' >> RELEASE_NOTES.md || true
          echo "" >> RELEASE_NOTES.md

          echo "## Documentation" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD \
          --pretty=format:"%s" | grep "^docs:" | sed 's/^docs:/-/' >> RELEASE_NOTES.md || true
          echo "" >> RELEASE_NOTES.md

          echo "## Other Changes" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD \
          --pretty=format:"- %s" >> RELEASE_NOTES.md || true

          echo "" >> RELEASE_NOTES.md
          echo "## Assets" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- adguard-update" >> RELEASE_NOTES.md
          echo "- install.sh" >> RELEASE_NOTES.md
          echo "- checksums.txt" >> RELEASE_NOTES.md

      # ---------------------------------------------------------
      # Create GitHub Release
      # ---------------------------------------------------------

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:

          name: Release ${{ github.ref_name }}

          body_path: RELEASE_NOTES.md

          files: |
            adguard-update
            install.sh
            checksums.txt