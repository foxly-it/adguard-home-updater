# =========================================================
# File: .github/workflows/release.yml
# =========================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  release:

    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------
      # Inject version into script
      # -----------------------------------------------------

      - name: Inject version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Injecting version $VERSION"
          sed -i "s/VERSION=\"dev\"/VERSION=\"$VERSION\"/" adguard-update

      # -----------------------------------------------------
      # Make executable
      # -----------------------------------------------------

      - name: Set executable permissions
        run: |
          chmod +x adguard-update
          chmod +x install.sh

      # -----------------------------------------------------
      # Generate checksums
      # -----------------------------------------------------

      - name: Generate checksums
        run: |
          sha256sum adguard-update > adguard-update.sha256
          sha256sum adguard-update install.sh > checksums.txt

      # -----------------------------------------------------
      # Debug: show files
      # -----------------------------------------------------

      - name: Show files
        run: |
          echo "Workspace:"
          pwd
          ls -lah

      # -----------------------------------------------------
      # Create release
      # -----------------------------------------------------

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------
      # Upload assets (separate step)
      # -----------------------------------------------------

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./adguard-update
            ./adguard-update.sha256
            ./install.sh
            ./checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}