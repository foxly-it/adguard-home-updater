name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  release:

    runs-on: ubuntu-latest

    steps:

      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inject version into script
      - name: Inject version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/VERSION=\"dev\"/VERSION=\"$VERSION\"/" adguard-update

      # Generate checksums
      - name: Generate checksums
        run: |
          sha256sum adguard-update > adguard-update.sha256
          sha256sum adguard-update install.sh > checksums.txt

      # Verify files exist
      - name: Debug assets
        run: |
          ls -lh

      # Create release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:

          name: Release ${{ github.ref_name }}

          files: |
            adguard-update
            adguard-update.sha256
            install.sh
            checksums.txt