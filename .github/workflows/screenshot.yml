name: CLI Screenshot

on:
  workflow_dispatch:
  push:
    paths:
      - adguard-update

jobs:

  screenshot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y asciinema

      - name: Record CLI
        run: |
          chmod +x adguard-update
          asciinema rec cli.cast -c "./adguard-update --help" -t "AdGuard Home Updater CLI" -y

      - name: Convert to SVG
        run: |
          npm install -g svg-term-cli
          cat cli.cast | svg-term --out cli-demo.svg

      - name: Commit screenshot
        run: |
          mkdir -p assets
          mv cli-demo.svg assets/cli-demo.svg

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add assets/cli-demo.svg

          git commit -m "update CLI screenshot" || echo "no changes"

          git push