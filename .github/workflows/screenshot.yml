name: CLI Screenshot

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - adguard-update
      - install.sh

jobs:

  screenshot:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CLI preview
        run: |
          chmod +x adguard-update
          mkdir -p assets

          ./adguard-update --help > cli.txt

      - name: Create static terminal screenshot
        run: |
          cat << 'EOF' > assets/cli-demo.svg
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
<style>
text { font-family: monospace; font-size: 14px; fill: #e6e6e6; }
</style>

<rect width="800" height="420" fill="#1e1e1e"/>

<text x="20" y="40">AdGuard Home Updater</text>
<text x="20" y="70">Foxly Infrastructure Tools</text>

<text x="20" y="120">Usage:</text>
<text x="20" y="150">  adguard-update [OPTIONS]</text>

<text x="20" y="200">Options:</text>
<text x="20" y="230">  --check</text>
<text x="20" y="250">  --dry-run</text>
<text x="20" y="270">  --force</text>
<text x="20" y="290">  --self-update</text>
<text x="20" y="310">  --status</text>
<text x="20" y="330">  --version</text>
<text x="20" y="350">  --help</text>

</svg>
EOF

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add assets/cli-demo.svg

          if git diff --cached --quiet; then
            echo "No screenshot changes"
          else
            git commit -m "docs: update CLI screenshot"
            git push
          fi