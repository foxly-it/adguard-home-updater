name: CLI Screenshot

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - adguard-update
    paths-ignore:
      - assets/cli-demo.svg

jobs:

  screenshot:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ---------------------------------------------------
      # Checkout repository (real branch, no detached HEAD)
      # ---------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y asciinema nodejs npm
          npm install -g svg-term-cli

      # ---------------------------------------------------
      # Record CLI demo
      # ---------------------------------------------------

      - name: Record CLI
        run: |
          chmod +x adguard-update
          asciinema rec cli.cast -c "./adguard-update --help" -t "AdGuard Home Updater CLI" -y

      # ---------------------------------------------------
      # Convert recording to SVG
      # ---------------------------------------------------

      - name: Generate SVG
        run: |
          mkdir -p assets
          cat cli.cast | svg-term --out assets/cli-demo.svg

      # ---------------------------------------------------
      # Commit screenshot if changed
      # ---------------------------------------------------

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add assets/cli-demo.svg

          if git diff --cached --quiet; then
            echo "No screenshot changes"
          else
            git commit -m "docs: update CLI screenshot"
            git push
          fi