name: CLI Screenshot

on:

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - adguard-update
      - install.sh

jobs:

  screenshot:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ----------------------------------------------------
      # Checkout repository
      # ----------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------
      # Install dependencies
      # ----------------------------------------------------

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y nodejs npm
          npm install -g svg-term-cli

      # ----------------------------------------------------
      # Generate CLI output
      # ----------------------------------------------------

      - name: Generate CLI preview
        run: |
          chmod +x adguard-update
          mkdir -p assets

          ./adguard-update --help > cli.txt

      # ----------------------------------------------------
      # Convert CLI output to SVG
      # ----------------------------------------------------

      - name: Render SVG
        run: |
          cat cli.txt | svg-term \
            --out assets/cli-demo.svg \
            --window \
            --padding 20 \
            --width 80 \
            --no-cursor

      # ----------------------------------------------------
      # Commit screenshot if changed
      # ----------------------------------------------------

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add assets/cli-demo.svg

          if git diff --cached --quiet; then
            echo "No screenshot changes"
          else
            git commit -m "docs: update CLI screenshot"
            git push
          fi