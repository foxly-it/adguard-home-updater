<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AdGuard Home Updater</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
    --accent: #4CAF50;
    --bg: #f4f7f5;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
}

[data-theme="dark"] {
    --bg: #0b1220;
    --card: #111827;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
}

/* TOPBAR */

.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

button {
    border: none;
    background: #e5e7eb;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

[data-theme="dark"] button {
    background: #1f2937;
    color: #e5e7eb;
}

/* HEADER */

.header {
    text-align: center;
    margin-bottom: 15px;
}

.header img {
    max-width: 320px;
}

/* BADGES */

.badges {
    text-align: center;
    margin-bottom: 20px;
}

.badge {
    display: inline-block;
    background: rgba(76,175,80,0.1);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 999px;
    margin: 4px;
    font-size: 13px;
}

/* STATS */

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.stat-card {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    transition: 0.2s ease;
}

.stat-card:hover {
    transform: translateY(-4px);
}

.stat-icon {
    font-size: 22px;
}

.stat-title {
    font-size: 12px;
    color: var(--muted);
}

.stat-value {
    font-size: 20px;
    font-weight: bold;
    margin-top: 5px;
}

/* CARDS */

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    transition: 0.2s ease;
}

.card:hover {
    transform: translateY(-3px);
}

/* CTA */

.cta {
    border: 2px solid var(--accent);
    background: rgba(76,175,80,0.08);
}

.cta:hover {
    box-shadow: 0 0 20px rgba(76,175,80,0.3);
}

/* CODE */

.code {
    background: #0f172a;
    color: #22c55e;
    padding: 12px;
    border-radius: 8px;
    font-family: monospace;
    position: relative;
}

/* COPY */

.copy-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    background: var(--accent);
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
}

/* TERMINAL */

.terminal {
    background: #000;
    color: #22c55e;
    padding: 15px;
    border-radius: 10px;
    font-family: monospace;
    min-height: 160px;
    white-space: pre-wrap;
}

/* FOOTER */

.footer {
    text-align: center;
    margin-top: 30px;
    color: var(--muted);
}

.footer a {
    color: var(--accent);
    text-decoration: none;
    margin: 0 6px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <div>
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('de')">DE</button>
    </div>
    <div>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="header">
    <img src="https://github.com/foxly-it/adguard-home-updater/blob/main/assets/banner.png?raw=true">
    <h1>AdGuard Home Updater</h1>
</div>

<!-- BADGES -->
<div class="badges">
    <span class="badge">✔ Secure</span>
    <span class="badge">✔ Open Source</span>
    <span class="badge">✔ ARM64 Ready</span>
</div>

<!-- STATS -->
<div class="stats">
    <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-title">Updater Version</div>
        <div class="stat-value" id="version">...</div>
    </div>

    <div class="stat-card">
        <div class="stat-icon">⬇️</div>
        <div class="stat-title">Installs</div>
        <div class="stat-value" id="downloads">...</div>
    </div>

    <div class="stat-card">
        <div class="stat-icon">🛡️</div>
        <div class="stat-title">AdGuard Latest</div>
        <div class="stat-value" id="aghVersion">...</div>
    </div>
</div>

<div class="card cta">
    <h2 data-en="Install" data-de="Installation"></h2>

    <div class="code" id="installCmd">
        curl -fsSL https://install.foxly.de/install.sh | sudo bash
        <button class="copy-btn" onclick="copyInstall()">Copy</button>
    </div>
</div>

<div class="card">
    <h2>Live CLI</h2>
    <div class="terminal" id="terminal"></div>
</div>

<div class="footer">
    <span data-en='
        <a href="https://foxly.de/datenschutzerklaerung/">Privacy Policy</a> |
        <a href="https://foxly.de/legal-notice/">Legal Notice</a>
    ' data-de='
        <a href="https://foxly.de/datenschutzerklaerung/">Datenschutzerklärung</a> |
        <a href="https://foxly.de/legal-notice/">Impressum</a>
    '></span>
</div>

</div>

<script>
function setLang(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.innerHTML = el.getAttribute("data-" + lang);
    });
}
setLang("en");

function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");
    if (current === "dark") {
        document.documentElement.removeAttribute("data-theme");
    } else {
        document.documentElement.setAttribute("data-theme", "dark");
    }
}

function copyInstall() {
    const el = document.getElementById("installCmd");
    const btn = el.querySelector(".copy-btn");

    const text = el.innerText.replace("Copy", "").trim();
    navigator.clipboard.writeText(text);

    btn.innerText = "Copied ✓";
    setTimeout(() => btn.innerText = "Copy", 1500);
}

// VERSION
fetch("https://api.github.com/repos/foxly-it/adguard-home-updater/releases/latest")
.then(r => r.json())
.then(d => document.getElementById("version").innerText = d.tag_name);

// DOWNLOADS
fetch("https://api.github.com/repos/foxly-it/adguard-home-updater/releases")
.then(r => r.json())
.then(data => {
    let total = 0;
    data.forEach(r => r.assets.forEach(a => total += a.download_count));
    document.getElementById("downloads").innerText = total;
});

// AGH VERSION
fetch("https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest")
.then(r => r.json())
.then(d => document.getElementById("aghVersion").innerText = d.tag_name);

// TERMINAL
const lines = [
    "Checking version...",
    "Downloading update...",
    "Verifying...",
    "Installing...",
    "Restarting service...",
    "✔ Update successful"
];

let i = 0;
let terminal = document.getElementById("terminal");

function typeLine() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine, 600);
    } else {
        setTimeout(() => {
            terminal.innerHTML = "";
            i = 0;
            typeLine();
        }, 3000);
    }
}
typeLine();
</script>

</body>
</html>
