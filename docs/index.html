<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AdGuard Home Updater</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
    --accent: #4CAF50;
    --bg: #f6f8fa;
    --card: #ffffff;
    --text: #222;
    --muted: #666;
}

[data-theme="dark"] {
    --bg: #0f1720;
    --card: #1a2330;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
}

/* HEADER */

.header {
    text-align: center;
    margin-bottom: 20px;
}

.header img {
    max-width: 320px;
}

/* TOP BAR */

.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

button {
    border: none;
    background: #e5e7eb;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* CARDS */

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* CTA */

.cta {
    border: 2px solid var(--accent);
    background: #eaf7ea;
    transition: 0.3s;
}

.cta:hover {
    box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
}

.code {
    background: #111;
    color: #0f0;
    padding: 12px;
    border-radius: 8px;
    font-family: monospace;
    position: relative;
}

.copy-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    background: var(--accent);
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
}

/* TERMINAL */

.terminal {
    background: #000;
    color: #0f0;
    padding: 15px;
    border-radius: 10px;
    font-family: monospace;
    min-height: 160px;
    white-space: pre-wrap;
}

/* FOOTER */

.footer {
    text-align: center;
    margin-top: 30px;
    color: var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <div>
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('de')">DE</button>
    </div>

    <div>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="header">
    <img src="https://github.com/foxly-it/adguard-home-updater/blob/main/assets/banner.png?raw=true">
    <h1>AdGuard Home Updater</h1>
    <p id="version">Loading version...</p>
    <p id="downloads">Loading installs...</p>
</div>

<div class="card cta">
    <h2 data-en="Install" data-de="Installation"></h2>

    <div class="code" id="installCmd">
        curl -fsSL https://install.foxly.de/install.sh | sudo bash
        <button class="copy-btn" onclick="copyInstall()">Copy</button>
    </div>
</div>

<div class="card">
    <h2>Live CLI</h2>
    <div class="terminal" id="terminal"></div>
</div>

<div class="card">
    <h2 data-en="Features" data-de="Funktionen"></h2>

    <ul data-en="
        <li>Automatic updates</li>
        <li>Rollback protection</li>
        <li>Checksum validation</li>
        <li>DNS health check</li>
    "
    data-de="
        <li>Automatische Updates</li>
        <li>Rollback Schutz</li>
        <li>Checksum Prüfung</li>
        <li>DNS Health Check</li>
    ">
    </ul>
</div>

<div class="footer">
    <a href="https://foxly.de/datenschutzerklaerung/">Privacy</a> |
    <a href="https://foxly.de/legal-notice/">Imprint</a>
</div>

</div>

<script>
// ============================
// LANGUAGE
// ============================

function setLang(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.innerHTML = el.getAttribute("data-" + lang);
    });
}

setLang("en");

// ============================
// THEME
// ============================

function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");

    if (current === "dark") {
        document.documentElement.removeAttribute("data-theme");
    } else {
        document.documentElement.setAttribute("data-theme", "dark");
    }
}

// ============================
// COPY BUTTON
// ============================

function copyInstall() {
    const el = document.getElementById("installCmd");
    const btn = el.querySelector(".copy-btn");

    const text = el.innerText.replace("Copy", "").trim();
    navigator.clipboard.writeText(text);

    btn.innerText = "Copied ✓";

    setTimeout(() => {
        btn.innerText = "Copy";
    }, 1500);
}

// ============================
// LIVE VERSION + DOWNLOADS
// ============================

fetch("https://api.github.com/repos/foxly-it/adguard-home-updater/releases/latest")
.then(r => r.json())
.then(data => {
    document.getElementById("version").innerText = "Version: " + data.tag_name;
});

fetch("https://api.github.com/repos/foxly-it/adguard-home-updater/releases")
.then(r => r.json())
.then(data => {
    let total = 0;

    data.forEach(r => {
        r.assets.forEach(a => total += a.download_count);
    });

    document.getElementById("downloads").innerText = "Installs: " + total;
});

// ============================
// TERMINAL ANIMATION
// ============================

const lines = [
    "Checking version...",
    "Latest version found",
    "Downloading release...",
    "Verifying checksum...",
    "Stopping service...",
    "Installing update...",
    "Starting service...",
    "Running DNS test...",
    "✔ Update successful"
];

let i = 0;
let terminal = document.getElementById("terminal");

function typeLine() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine, 600);
    } else {
        setTimeout(() => {
            terminal.innerHTML = "";
            i = 0;
            typeLine();
        }, 3000);
    }
}

typeLine();
</script>

</body>
</html>
