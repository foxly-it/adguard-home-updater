<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdGuard Home Updater – Foxly</title>

<style>
:root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --soft: #f0f3f7;
    --text: #1f2937;
    --muted: #6b7280;
    --accent: #4caf50;
    --border: #e5e7eb;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

/* HEADER */

.header {
    text-align: center;
    margin-bottom: 30px;
}

.header img {
    width: 100%;
    max-width: 720px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.header p {
    color: var(--muted);
}

/* LANGUAGE SWITCH */

.lang-switch {
    position: absolute;
    top: 15px;
    right: 20px;
}

.lang-switch button {
    border: 1px solid var(--border);
    background: white;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

.lang-switch .active {
    background: var(--accent);
    color: white;
}

/* CARD */

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

/* INSTALL */

.install-box {
    background: #111;
    color: #0f0;
    border-radius: 10px;
    padding: 15px;
    font-family: monospace;
    position: relative;
}

.copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
}

/* CTA */

.cta {
    border: 2px solid var(--accent);
    background: #eaf7ea;
}

/* GRID */

.grid {
    display: grid;
    gap: 15px;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

.feature {
    background: var(--soft);
    padding: 15px;
    border-radius: 10px;
}

/* FOOTER */

.footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.85rem;
    color: var(--muted);
}

.footer a {
    color: var(--accent);
    text-decoration: none;
}

/* CLI SVG */

.cli {
    text-align: center;
}

.cli img {
    max-width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
}

</style>
</head>

<body>

<div class="lang-switch">
    <button onclick="setLang('en')" id="btn-en" class="active">EN</button>
    <button onclick="setLang('de')" id="btn-de">DE</button>
</div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="https://github.com/foxly-it/adguard-home-updater/blob/main/assets/banner.png?raw=true">
        <h1 data-en="AdGuard Home Updater" data-de="AdGuard Home Updater"></h1>
        <p data-en="Safe and automated updates for bare-metal installations"
           data-de="Automatische, sichere Updates für Bare-Metal Installationen"></p>

        <p id="version" style="margin-top:10px; font-size:0.9rem; color:#6b7280;">
            Loading version...
        </p>
    </div>

    <!-- INSTALL CTA -->
    <div class="card cta">
        <strong data-en="Install in one command" data-de="Installation in einem Befehl"></strong>

        <div class="install-box" id="installCmd">
curl -fsSL https://install.foxly.de/install.sh | sudo bash
            <button class="copy-btn" onclick="copyInstall()">Copy</button>
        </div>
    </div>

    <!-- WHY -->
    <div class="card">
        <p data-en="Why this tool?" data-de="Warum dieses Tool?"></p>
        <p data-en="The built-in updater often fails on ARM systems."
           data-de="Der integrierte Updater funktioniert auf ARM oft nicht zuverlässig."></p>
    </div>

    <!-- FEATURES -->
    <div class="card">
        <div class="grid">
            <div class="feature">
                <strong>Auto Update</strong>
                <p data-en="Detects new versions automatically"
                   data-de="Erkennt neue Versionen automatisch"></p>
            </div>

            <div class="feature">
                <strong>Rollback</strong>
                <p data-en="Restores previous version"
                   data-de="Rollback bei Fehlern"></p>
            </div>

            <div class="feature">
                <strong>DNS Check</strong>
                <p data-en="Verifies DNS after update"
                   data-de="DNS Prüfung nach Update"></p>
            </div>

            <div class="feature">
                <strong>Dry Run</strong>
                <p data-en="Simulation mode"
                   data-de="Simulation ohne Änderungen"></p>
            </div>
        </div>
    </div>

    <!-- CLI PREVIEW -->
    <div class="card cli">
        <strong>CLI Preview</strong>
        <img src="/assets/cli-demo.svg">
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>© Foxly Infrastructure Tools</p>
        <p>
            <a href="https://foxly.de/datenschutzerklaerung/" target="_blank">Datenschutz</a> |
            <a href="https://foxly.de/legal-notice/" target="_blank">Impressum</a> |
            <a href="https://github.com/foxly-it/adguard-home-updater" target="_blank">GitHub</a>
        </p>
    </div>

</div>

<script>
function setLang(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + lang);
    });

    document.getElementById("btn-en").classList.remove("active");
    document.getElementById("btn-de").classList.remove("active");
    document.getElementById("btn-" + lang).classList.add("active");
}

function copyInstall() {
    const text = document.getElementById("installCmd").innerText.trim();
    navigator.clipboard.writeText(text);
}

/* Live Version */
fetch("https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest")
.then(r => r.json())
.then(data => {
    document.getElementById("version").innerText =
        "Latest AdGuard Home: " + data.tag_name;
})
.catch(() => {
    document.getElementById("version").innerText = "";
});

setLang("en");
</script>

</body>
</html>
