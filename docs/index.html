<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdGuard Home Updater</title>

<style>

body{
font-family: system-ui, sans-serif;
background:#0f1115;
color:#e5e7eb;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
max-width:720px;
padding:40px;
text-align:center;
}

.logo{
max-width:520px;
margin-bottom:25px;
}

h1{
font-size:2rem;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
}

.code{
background:#1a1d24;
padding:16px;
border-radius:10px;
font-family:monospace;
font-size:.95rem;
word-break:break-all;
}

button{
margin-top:15px;
padding:10px 18px;
border:none;
background:#22c55e;
color:black;
font-weight:600;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#4ade80;
}

.links{
margin-top:25px;
font-size:.9rem;
opacity:.7;
}

a{
color:#4ade80;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://raw.githubusercontent.com/foxly-it/adguard-home-updater/main/assets/banner.png">

<h1>AdGuard Home Updater</h1>

<p class="subtitle">
Safe automatic updates for AdGuard Home bare-metal installations
</p>

<div class="code" id="install">
curl -fsSL https://foxly-it.github.io/adguard-home-updater/install.sh | sudo bash
</div>

<button onclick="copyInstall()">Copy Install Command</button>

<div class="links">

<p>

<a href="https://github.com/foxly-it/adguard-home-updater">GitHub Repository</a>

</p>

</div>

</div>

<script>

function copyInstall(){
const text=document.getElementById("install").innerText
navigator.clipboard.writeText(text)
}

</script>

</body>

</html>
