<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdGuard Home Updater – Foxly</title>

<style>
:root {
    --bg: #0f141a;
    --card: #1b222c;
    --card-soft: #232c38;
    --text: #e6edf3;
    --muted: #9aa4b2;
    --accent: #4caf50;
    --border: #2f3945;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #0f141a 0%, #121821 100%);
    color: var(--text);
}

/* CONTAINER */

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

/* HEADER */

.header {
    text-align: center;
    margin-bottom: 30px;
}

.header img {
    width: 100%;
    max-width: 720px;
    border-radius: 14px;
    margin-bottom: 20px;
}

.header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.header p {
    color: var(--muted);
}

/* LANGUAGE SWITCH */

.lang-switch {
    position: absolute;
    top: 20px;
    right: 20px;
}

.lang-switch button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    margin-left: 5px;
    border-radius: 6px;
    cursor: pointer;
}

.lang-switch button.active {
    background: var(--accent);
    color: #000;
}

/* CARD */

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
}

/* INSTALL */

.install {
    background: #0b0f14;
    border-radius: 10px;
    padding: 14px;
    font-family: monospace;
    overflow-x: auto;
    margin-top: 10px;
}

/* GRID */

.grid {
    display: grid;
    gap: 15px;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

/* FEATURE */

.feature {
    background: var(--card-soft);
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--border);
}

.feature h3 {
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 5px;
}

.feature p {
    font-size: 0.9rem;
    color: var(--muted);
}

/* FOOTER */

.footer {
    text-align: center;
    margin-top: 50px;
    font-size: 0.85rem;
    color: var(--muted);
}

.footer a {
    color: var(--accent);
    text-decoration: none;
    margin: 0 8px;
}

.footer a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="lang-switch">
    <button onclick="setLang('de')" id="btn-de" class="active">DE</button>
    <button onclick="setLang('en')" id="btn-en">EN</button>
</div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="https://github.com/foxly-it/adguard-home-updater/blob/main/assets/banner.png?raw=true">
        <h1 data-de="AdGuard Home Updater" data-en="AdGuard Home Updater"></h1>
        <p data-de="Automatische, sichere Updates für Bare-Metal Installationen"
           data-en="Safe and automated updates for bare-metal installations"></p>
    </div>

    <!-- WHY -->
    <div class="card">
        <p data-de="Warum dieses Tool?" data-en="Why this tool?"></p>
        <p data-de="Der integrierte Updater funktioniert auf vielen ARM-Systemen nicht zuverlässig."
           data-en="The built-in updater often fails on ARM systems."></p>
        <p data-de="Dieses Script übernimmt den kompletten Update-Prozess inklusive Backup und Rollback."
           data-en="This script handles updates including backup and rollback."></p>
    </div>

    <!-- INSTALL -->
    <div class="card">
        <p data-de="Installation" data-en="Installation"></p>
        <div class="install">
curl -fsSL https://install.foxly.de/install.sh | sudo bash
        </div>
    </div>

    <!-- FEATURES -->
    <div class="card">
        <p data-de="Features" data-en="Features"></p>

        <div class="grid">

            <div class="feature">
                <h3>🔄 Auto Update</h3>
                <p data-de="Erkennt neue Versionen automatisch"
                   data-en="Detects new versions automatically"></p>
            </div>

            <div class="feature">
                <h3>🛡 Rollback</h3>
                <p data-de="Stellt alte Version bei Fehler wieder her"
                   data-en="Restores previous version on failure"></p>
            </div>

            <div class="feature">
                <h3>🔍 DNS Check</h3>
                <p data-de="Prüft DNS Funktion nach Update"
                   data-en="Verifies DNS after update"></p>
            </div>

            <div class="feature">
                <h3>🧪 Dry Run</h3>
                <p data-de="Simulation ohne Änderungen"
                   data-en="Simulation without changes"></p>
            </div>

        </div>
    </div>

    <!-- EXAMPLE -->
    <div class="card">
        <p data-de="Test (Dry Run)" data-en="Test (Dry Run)"></p>
        <div class="install">
sudo adguard-update --dry-run
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>© Foxly Infrastructure Tools</p>
        <p>
            <a href="https://foxly.de/datenschutzerklaerung/" target="_blank">Datenschutz</a> |
            <a href="https://foxly.de/legal-notice/" target="_blank">Impressum</a> |
            <a href="https://github.com/foxly-it/adguard-home-updater" target="_blank">GitHub</a>
        </p>
    </div>

</div>

<script>
function setLang(lang) {
    document.querySelectorAll("[data-de]").forEach(el => {
        el.textContent = el.getAttribute("data-" + lang);
    });

    document.getElementById("btn-de").classList.remove("active");
    document.getElementById("btn-en").classList.remove("active");

    document.getElementById("btn-" + lang).classList.add("active");
}

setLang('de');
</script>

</body>
</html>
